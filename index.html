  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
    }

    #app {
      max-width: 600px;
      width: 100%;
      background: #ffffff;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

#start-button {
  padding: 10px 20px;
  border-radius: 4px;
  border: 1px solid #007bff;
  background-color: #007bff;
  color: #ffffff;
  cursor: pointer;
}

#start-button:hover {
  background-color: #0056b3;
}

    #modes, #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    #modes button {
      flex: 1 1 120px;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #007bff;
      background-color: #ffffff;
      color: #007bff;
      cursor: pointer;
    }

    #modes button:hover {
      background-color: #007bff;
      color: #ffffff;
    }

    #filters label {
      font-size: 0.9rem;
    }

    #score, #streak, #roundTime, #avgTime {
      text-align: center;
      margin: 4px 0;
    }

    #question {
      font-weight: bold;
      text-align: center;
      margin: 16px 0;
      min-height: 40px;
    }

    #options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    #options button {
      padding: 10px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background-color: #e9edf5;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
    }

    #options button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #next-container {
      text-align: center;
      margin-top: 8px;
    }

    #next-container button {
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid #28a745;
      background-color: #28a745;
      color: #ffffff;
      cursor: pointer;
    }

    #next-container button:hover {
      background-color: #218838;
    }

    #feedback {
      text-align: center;
      font-weight: bold;
      min-height: 24px;
      margin-top: 4px;
    }

    #feedback.correct {
      color: #2e7d32; /* green */
    }

    #feedback.incorrect {
      color: #c62828; /* red */
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      #app {
        padding: 12px;
      }

      #options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

  <div id="options"></div>
  <p id="feedback"></p>

</div>

function resetMisses() {
  missedDrugs = [];

  // Optional: small feedback message
  const feedbackEl = document.getElementById("feedback");
  if (feedbackEl) {
    feedbackEl.textContent = "Missed list cleared.";
    feedbackEl.classList.remove("correct", "incorrect");
  }
}

function startGame() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("quiz-screen").style.display = "block";

  // reset stats for the run, but keep currentMode and activeDrugs from setup
  score = 0;
  total = 0;
  streak = 0;
  bestStreak = 0;
  missedDrugs = [];

  document.getElementById("score").textContent = "Score: 0 / 0";
  document.getElementById("streak").textContent = "Streak: 0";
  document.getElementById("feedback").textContent = "";
  document.getElementById("roundTime").textContent = "Round time: 0.0 s";
  document.getElementById("avgTime").textContent = "Avg per question: 0.0 s";

  roundStartTime = Date.now();
  lastQuestionStartTime = Date.now();
  totalQuestionTime = 0;
  questionsThisRound = 0;

  if (roundTimerInterval !== null) {
    clearInterval(roundTimerInterval);
  }
  roundTimerInterval = setInterval(() => {
    const now = Date.now();
    const elapsedRoundSec = ((now - roundStartTime) / 1000).toFixed(1);
    document.getElementById("roundTime").textContent =
      "Round time: " + elapsedRoundSec + " s";
  }, 100);

  newQuestion();
}

function returnToStart() {
  // stop the round timer
  if (roundTimerInterval !== null) {
    clearInterval(roundTimerInterval);
    roundTimerInterval = null;
  }

  // reset key state
  score = 0;
  total = 0;
  streak = 0;
  bestStreak = 0;
  questionsThisRound = 0;
  totalQuestionTime = 0;

  // clear quiz UI
  document.getElementById("score").textContent = "Score: 0 / 0";
  document.getElementById("streak").textContent = "Streak: 0";
  document.getElementById("roundTime").textContent = "Round time: 0.0 s";
  document.getElementById("avgTime").textContent = "Avg per question: 0.0 s";
  document.getElementById("question").textContent = "";
  document.getElementById("options").innerHTML = "";
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").classList.remove("correct", "incorrect");

  // show start screen again
  document.getElementById("quiz-screen").style.display = "none";
  document.getElementById("start-screen").style.display = "block";

  // optionally reset mode to infinite and activeDrugs to all drugs
  currentMode = "infinite";
  activeDrugs = drugs;
}

  const btn = document.getElementById("review-button");

  if (currentMode === "reviewMisses") {
    // go back to normal quiz mode (using stored normalActiveDrugs)
    currentMode = "infinite";
    maxQuestionsThisRound = Infinity;
    activeDrugs = normalActiveDrugs || drugs;
    btn.textContent = "Review Misses";
  } else {
    // entering review mode: remember current normal pool
    normalActiveDrugs = activeDrugs || drugs;

    currentMode = "reviewMisses";
    maxQuestionsThisRound = Infinity;
    activeDrugs = missedDrugs.length > 0 ? missedDrugs : drugs;
    btn.textContent = "Return to Quiz";
  }

  questionsThisRound = 0;
  newQuestion();
}

function setMode(mode) {
  currentMode = mode;
  questionsThisRound = 0;

if (mode === "infinite") {
  maxQuestionsThisRound = Infinity;
  activeDrugs = normalActiveDrugs || drugs;
} else if (mode === "classic20") {
  maxQuestionsThisRound = 20;
  activeDrugs = normalActiveDrugs || drugs;
} else if (mode === "reviewMisses") {
  maxQuestionsThisRound = Infinity;
  activeDrugs = missedDrugs.length > 0 ? missedDrugs : drugs;
}

  const reviewBtn = document.getElementById("review-button");
  if (reviewBtn) {
    reviewBtn.textContent =
      currentMode === "reviewMisses" ? "Return to Quiz" : "Review Misses";
  }

  // reset score & streak
  score = 0;
  total = 0;
  streak = 0;
  bestStreak = 0;

  document.getElementById("score").textContent = "Score: 0 / 0";
  document.getElementById("streak").textContent = "Streak: 0";
  document.getElementById("feedback").textContent = "";

  roundStartTime = Date.now();
  lastQuestionStartTime = Date.now();
  totalQuestionTime = 0;

  if (roundTimerInterval !== null) {
    clearInterval(roundTimerInterval);
  }
  roundTimerInterval = setInterval(() => {
    const now = Date.now();
    const elapsedRoundSec = ((now - roundStartTime) / 1000).toFixed(1);
    document.getElementById("roundTime").textContent =
      "Round time: " + elapsedRoundSec + " s";
  }, 100);

  document.getElementById("roundTime").textContent = "Round time: 0.0 s";
  document.getElementById("avgTime").textContent = "Avg per question: 0.0 s";

  newQuestion();
}

function newQuestion() {
  // check if we've hit the question limit for this mode
if (questionsThisRound >= maxQuestionsThisRound) {
  const feedbackEl = document.getElementById("feedback");
  feedbackEl.textContent = "Round over! Final score: " + score + " / " + total +
    " | Best streak: " + bestStreak;

  if (roundTimerInterval !== null) {
    clearInterval(roundTimerInterval);
    roundTimerInterval = null;
  }
  return;
}
lastQuestionStartTime = Date.now();

  const questionEl = document.getElementById("question");
  const optionsEl = document.getElementById("options");
  const feedbackEl = document.getElementById("feedback");

  feedbackEl.textContent = "";

  const correctDrug = getRandomDrug();
  currentDrug = correctDrug;

    const random = Math.random();
    let questionTypeNumber;

    if (random < 1 / 3) {
      questionTypeNumber = 0;      // brand → generic
    } else if (random < 2 / 3) {
      questionTypeNumber = 1;      // generic → brand
    } else {
      questionTypeNumber = 2;      // brand → class
    }

    if (questionTypeNumber === 0) {
      // Type 1: Brand → Generic
      currentQuestionType = "brand-to-generic";
      currentCorrectGeneric = correctDrug.generic;
      currentCorrectBrand = correctDrug.brand;
      currentCorrectClass = correctDrug.class;

      questionEl.textContent = "What is the generic name of " + correctDrug.brand + "?";

      let wrongOptions = activeDrugs
        .filter(d => d.generic !== correctDrug.generic)
        .map(d => d.generic);

      wrongOptions = wrongOptions.sort(() => Math.random() - 0.5);

      const allOptions = [currentCorrectGeneric, ...wrongOptions].slice(0, 4);
      const shuffled = allOptions.sort(() => Math.random() - 0.5);

      optionsEl.innerHTML = "";

      shuffled.forEach(function(option) {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = function() {
          checkAnswer(option);
        };
        optionsEl.appendChild(btn);
      });

    } else if (questionTypeNumber === 1) {
      // Type 2: Generic → Brand
      currentQuestionType = "generic-to-brand";
      currentCorrectGeneric = correctDrug.generic;
      currentCorrectBrand = correctDrug.brand;
      currentCorrectClass = correctDrug.class;

      questionEl.textContent = "Which brand name matches " + correctDrug.generic + "?";

      let wrongOptions = activeDrugs
        .filter(d => d.brand !== correctDrug.brand)
        .map(d => d.brand);

      wrongOptions = wrongOptions.sort(() => Math.random() - 0.5);

      const allOptions = [currentCorrectBrand, ...wrongOptions].slice(0, 4);
      const shuffled = allOptions.sort(() => Math.random() - 0.5);

      optionsEl.innerHTML = "";

      shuffled.forEach(function(option) {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = function() {
          checkAnswer(option);
        };
        optionsEl.appendChild(btn);
      });

    } else if (questionTypeNumber === 2) {
      // Type 3: Brand → Class
      currentQuestionType = "brand-to-class";
      currentCorrectGeneric = correctDrug.generic;
      currentCorrectBrand = correctDrug.brand;
      currentCorrectClass = correctDrug.class;

      questionEl.textContent = "What is the drug class of " + correctDrug.brand + "?";

      let wrongOptions = activeDrugs
        .filter(d => d.class !== correctDrug.class)
        .map(d => d.class);

      wrongOptions = wrongOptions.sort(() => Math.random() - 0.5);

      const allOptions = [currentCorrectClass, ...wrongOptions].slice(0, 4);
      const shuffled = allOptions.sort(() => Math.random() - 0.5);

      optionsEl.innerHTML = "";

      shuffled.forEach(function(option) {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = function() {
          checkAnswer(option);
        };
        optionsEl.appendChild(btn);
      });
    }
  }

function checkAnswer(selected) {
  const feedbackEl = document.getElementById("feedback");
  const scoreEl = document.getElementById("score");
  const streakEl = document.getElementById("streak");
  const roundTimeEl = document.getElementById("roundTime");
  const avgTimeEl = document.getElementById("avgTime");

  const now = Date.now();

  // time for this question
  const questionTime = now - lastQuestionStartTime; // in ms
  totalQuestionTime += questionTime;

  total = total + 1;
  questionsThisRound = questionsThisRound + 1;

  let isCorrect = false;
  let correctText = "";

  if (currentQuestionType === "brand-to-generic") {
    isCorrect = (selected === currentCorrectGeneric);
    correctText = currentCorrectGeneric;
  } else if (currentQuestionType === "generic-to-brand") {
    isCorrect = (selected === currentCorrectBrand);
    correctText = currentCorrectBrand;
  } else if (currentQuestionType === "brand-to-class") {
    isCorrect = (selected === currentCorrectClass);
    correctText = currentCorrectClass;
  }

feedbackEl.classList.remove("correct", "incorrect");

if (isCorrect) {
  score = score + 1;
  streak = streak + 1;
  if (streak > bestStreak) {
    bestStreak = streak;
  }
  feedbackEl.textContent = "Correct!";
  feedbackEl.classList.add("correct");
} else {
  streak = 0;
  feedbackEl.textContent = "Not quite. The correct answer is " + correctText + ".";
  feedbackEl.classList.add("incorrect");

  const alreadyMissed = missedDrugs.some(d =>
    d.brand === currentDrug.brand && d.generic === currentDrug.generic
  );
  if (!alreadyMissed) {
    missedDrugs.push(currentDrug);
  }
}

  scoreEl.textContent = "Score: " + score + " / " + total;
  streakEl.textContent = "Streak: " + streak + " (Best: " + bestStreak + ")";

  // timing display
  const elapsedRoundSec = ((now - roundStartTime) / 1000).toFixed(1);
  let avgSec = 0;
  if (total > 0) {
    avgSec = (totalQuestionTime / total / 1000).toFixed(1);
  }

  roundTimeEl.textContent = "Round time: " + elapsedRoundSec + " s";
  avgTimeEl.textContent = "Avg per question: " + avgSec + " s";

  // disable buttons so the question can only be answered once
  const optionButtons = document.querySelectorAll("#options button");
  optionButtons.forEach(btn => {
    btn.disabled = true;
  });
}

</script>
